<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style/style.css">
    <script type="module" src="src/index.ts"></script>
</head>
<body>
    <div id="root">
        <fieldset id="level">
            <legend>Level</legend>
            <div class="field">
                <label for="sailingLevel">Sailing level</label>
                <input type="number" id="sailingLevel" min="1" max="99" value="1" />
            </div>
            <div class="field">
                <label for="constructionLevel">Construction level</label>
                <input type="number" id="constructionLevel" min="1" max="99" value="1" />
            </div>
        </fieldset>

        <fieldset id="boat-type">
            <legend>Boat type</legend>
            <div class="field">
                <label for="raft">Raft</label>
                <input type="radio" id="raft" name="boat-type" value="raft" />
            </div>
            <div class="field">
                <label for="skiff">Skiff</label>
                <input type="radio" id="skiff" name="boat-type" value="skiff" checked="checked"/>
            </div>
            <div class="field">
                <label for="sloop">Sloop</label>
                <input type="radio" id="sloop" name="boat-type" value="sloop" />
            </div>
        </fieldset>

        <fieldset id="facilities">
            <legend>Facilities</legend>
            <div class="field">
                <label for="mast-and-sail">Mast and sail</label>
                <input type="checkbox" id="mast-and-sail" value="mast-and-sail" />
            </div>
            <div class="field">
                <label for="keel">Keel</label>
                <input type="checkbox" id="keel" value="keel" />
            </div>
            <div class="field">
                <label for="hull">Hull</label>
                <input type="checkbox" id="hull" value="hull" />
            </div>
            <div class="field">
                <label for="helm">Helm</label>
                <input type="checkbox" id="helm" value="helm" />
            </div>
            <div class="field">
                <label for="cargo-hold">Cargo hold</label>
                <input type="checkbox" id="cargo-hold" value="cargo-hold" />
            </div>
            <div class="field">
                <label for="salvaging-hook">Salvaging hook</label>
                <input type="checkbox" id="salvaging-hook" value="salvaging-hook" />
            </div>
            <div class="field">
                <label for="cannon">Cannon</label>
                <input type="checkbox" id="cannon" value="cannon" />
            </div>
            <div class="field">
                <label for="trawling-net">Trawling net</label>
                <input type="checkbox" id="trawling-net" value="trawling-net" />
            </div>
            <div class="field">
                <label for="special-toggle">Special facilities</label>
                <input type="checkbox" id="special-toggle" />
            </div>
            <div id="special-facilities" hidden>
                <div class="field subfield">
                    <label for="station">Station</label>
                    <input type="checkbox" id="station" value="station" />
                </div>
                <div class="field subfield">
                    <label for="wind">Wind</label>
                    <input type="checkbox" id="wind" value="wind" />
                </div>
                <div class="field subfield">
                    <label for="misc">Misc</label>
                    <input type="checkbox" id="misc" value="misc" />
                </div>
            </div>
            <br>
            <div class="field">
                <label for="exclude"><b>Exclude Dragon Items</b></label>
                <input type="checkbox" id="exclude" value="exclude" />
            </div>
            <button id="calculate">Calculate</button>
        </fieldset>

        <fieldset class="total">
            <legend>Shopping list</legend>
            <div id="totals-grid">

            </div>
        </fieldset>

        <fieldset id="results">
            <legend>Components</legend>
            <div id="results-grid">
            </div>
        </fieldset>
    </div>
</body>
</html>
